apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: sanketjadhav84/portfolio-backend:latest

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: "10.104.79.170"

        - name: DB_USER
          value: "root"

        - name: DB_PASSWORD
          value: "root123"

        - name: DB_NAME
          value: "portfolio"