services:
  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "5000:5000"
    
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "8080:80"
    
    depends_on:
      - backend

  mysql:
    image: mysql
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: portfolio
    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: 